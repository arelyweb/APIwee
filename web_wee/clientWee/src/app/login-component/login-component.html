<mat-card style="max-width:400px;margin:24px auto;padding:16px">
      <h2>Login system</h2>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="fill" style="width:100%">
          <mat-label>User</mat-label>
          <input matInput formControlName="nameUser" type="text" />
        </mat-form-field>

        <mat-form-field appearance="fill" style="width:100%">
          <mat-label>Password</mat-label>
          <input matInput formControlName="passUser" type="password" />
        </mat-form-field>

        <div style="text-align:right">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Login</button>
        </div>
      </form>
      <a href="/register">Register</a>

    </mat-card>
