<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="login-form"(click)="login()">
        <mat-form-field appearance="fill">
          <mat-label>User</mat-label>
         <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Email"
            required="required"
          />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Password</mat-label>
          <!-- <input matInput type="password" [(ngModel)]="password" name="password" required> -->
                <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Password"
            required="required"
          />
          <!-- <mat-error *ngIf="">Password is required</mat-error> -->
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit">Log In</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
