<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="login-form" (submit)="onSubmit()">
        <mat-form-field appearance="fill">
          <mat-label>Username</mat-label>
          <input matInput type="text"  name="username" required>
          <mat-error *ngIf="">Username is required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Password</mat-label>
          <!-- <input matInput type="password" [(ngModel)]="password" name="password" required> -->
          <input matInput type="password" name="password" required>
          <mat-error *ngIf="">Password is required</mat-error>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit">Log In</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
